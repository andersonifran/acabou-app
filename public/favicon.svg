<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <!-- Quadrado verde oficial, cantos levemente arredondados (fora = TRANSPARENTE,
       sem fundo branco). Favicon: SEM a bolinha do "?", pra a casinha + checklist
       ficarem bem maiores e visiveis no tamanho pequeno. -->
  <rect width="96" height="96" rx="16" fill="#1E9839"/>
  <g fill="none" stroke="#ffffff" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Telhado + paredes (casa MAIOR) -->
    <polyline points="12,47 48,10 84,47"/>
    <path d="M 18 47 L 18 78 Q 18 86 26 86 L 60 86"/>
    <!-- Parede direita + rabinho (mantido), sem bolinha -->
    <path d="M 78 47 L 78 67 Q 78 86 60 86 Q 47 86 47 90"/>
  </g>
  <!-- Ticado (✓) um pouco mais GROSSO — destaque -->
  <polyline points="30,56 37,63 48,50" fill="none" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Linhas + bolinhas mais FINAS (respiro, não empastelam) -->
  <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="53" y1="56" x2="73" y2="56"/>
    <line x1="45" y1="68" x2="73" y2="68"/>
    <line x1="45" y1="79" x2="69" y2="79"/>
  </g>
  <circle cx="36" cy="68" r="2.9" fill="#ffffff"/>
  <circle cx="36" cy="79" r="2.9" fill="#ffffff"/>
</svg>
